version: '3.9'

services:

  # ────────────────────────────────────────────────────────
  # PostgreSQL 16 — primary data store
  # ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: guard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: guard
      POSTGRES_PASSWORD: guardpass
      POSTGRES_DB: guarddb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guard -d guarddb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────
  # Eclipse Mosquitto 2 — MQTT broker
  # ────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: guard-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  # ────────────────────────────────────────────────────────
  # G.U.A.R.D Backend — Node.js Express API
  # ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guard-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Override the DB URL to use the Docker service name (not localhost)
      DATABASE_URL: postgresql://guard:guardpass@postgres:5432/guarddb
      # Override the MQTT URL to use the Docker service name
      MQTT_BROKER_URL: mqtt://mosquitto:1883
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    # Run Prisma migrations before starting the server
    command: >
      sh -c "npx prisma migrate deploy && node src/server.js"

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
