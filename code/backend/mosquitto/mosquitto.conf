# ─────────────────────────────────────────────────────────
# Mosquitto MQTT Broker Configuration — G.U.A.R.D
# ─────────────────────────────────────────────────────────

# Listen on default MQTT port
listener 1883
protocol mqtt

# Authentication
# IMPORTANT: In production, do not allow anonymous connections. Require
# clients to authenticate using a password file or TLS client certificates.
# ⚠️ DEV MODE: Allow anonymous for local testing only
allow_anonymous true
# password_file C:\Users\ravin\mosquitto-passwd

# Persistence (disabled for local dev to avoid file permissions issues)
persistence false
# persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
