# ─────────────────────────────────────────────────────────
# Mosquitto MQTT Broker Configuration — G.U.A.R.D
# ─────────────────────────────────────────────────────────

# Listen on default MQTT port
listener 1883
protocol mqtt

# Authentication
# IMPORTANT: In production, do not allow anonymous connections. Require
# clients to authenticate using a password file or TLS client certificates.
allow_anonymous false
# Use a path relative to the Docker container mount — NOT an absolute dev machine path
password_file /mosquitto/config/passwd

# Persistence — retain messages and queue state across broker restarts
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
