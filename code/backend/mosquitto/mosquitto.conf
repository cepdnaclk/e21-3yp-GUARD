# ─────────────────────────────────────────────────────────
# Mosquitto MQTT Broker Configuration — G.U.A.R.D
# ─────────────────────────────────────────────────────────

# Listen on default MQTT port
listener 1883
protocol mqtt

# Development: allow anonymous connections (no username/password).
# IMPORTANT: For production, set allow_anonymous to false and configure
# a password file or TLS client certificates for device authentication.
allow_anonymous true

# Persistence — retain messages and queue state across broker restarts
persistence true
persistence_location C:\Users\ravin\mosquitto-data\

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
